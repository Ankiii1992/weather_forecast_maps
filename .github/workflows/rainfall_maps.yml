name: Rainfall Forecast Maps

on:
  #schedule:
    # Run twice daily — for 00z and 12z cycles only.
    # Offset by 3.5 hours to allow model data to be fully published.
    #- cron: '30 3 * * *'   # 03:30 UTC → for 00z run
    #- cron: '30 15 * * *'  # 15:30 UTC → for 12z run

  workflow_dispatch:
    # Manual trigger — pick model and cycle explicitly.
    # Use this when you know a specific run is ready.
    inputs:
      model:
        description: 'Model to run'
        required: true
        default: 'both'
        type: choice
        options: [both, GFS, ECMWF, ICON, all]
      cycle:
        description: 'Model cycle UTC hour (auto = detect from cron time)'
        required: true
        default: 'auto'
        type: choice
        options: ['auto', '00', '06', '12', '18']

jobs:

  # ── JOB 1: GFS + ECMWF ───────────────────────────────────────────────────
  # Skipped when model = ICON only.
  generate-maps:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event.inputs.model != 'ICON'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgeos-dev libproj-dev proj-data proj-bin \
            libeccodes-dev libeccodes-tools \
            libraqm-dev libfribidi-dev libharfbuzz-dev \
            python3-eccodes

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install eccodes==1.6.1
          pip install cfgrib xarray
          pip install -r requirements.txt

      - name: Determine model and cycle
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "model=${{ github.event.inputs.model }}" >> $GITHUB_OUTPUT
            echo "cycle=${{ github.event.inputs.cycle }}" >> $GITHUB_OUTPUT
          else
            echo "model=both" >> $GITHUB_OUTPUT
            echo "cycle=auto" >> $GITHUB_OUTPUT
          fi

      - name: Download existing meta.json from R2 (for preservation)
        run: |
          mkdir -p output
          curl -sf "${{ secrets.R2_PUBLIC_URL }}/latest/meta.json" \
            -o output/existing_meta.json || echo "No existing meta.json found (first run)"
        continue-on-error: true

      - name: Generate rainfall PNG maps
        run: |
          python scripts/rainfall_png_maps.py \
            --district-geojson geodata/gujarat_district_clean.geojson \
            --india-geojson geodata/india-composite.geojson \
            --india-states-geojson geodata/india_state.geojson \
            --model ${{ steps.params.outputs.model }} \
            --cycle ${{ steps.params.outputs.cycle }} \
            --outdir output
        env:
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL:      ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME:       ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL:        ${{ secrets.R2_PUBLIC_URL }}

      - name: Upload to Cloudflare R2
        run: python scripts/upload_to_r2.py
        env:
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL:      ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME:       ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL:        ${{ secrets.R2_PUBLIC_URL }}

      - name: Summary
        run: |
          echo "## Rainfall Maps" >> $GITHUB_STEP_SUMMARY
          echo "- Model: ${{ steps.params.outputs.model }}" >> $GITHUB_STEP_SUMMARY
          echo "- Cycle: ${{ steps.params.outputs.cycle }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u)" >> $GITHUB_STEP_SUMMARY
          PNG_COUNT=$(find output -name "*.png" 2>/dev/null | wc -l)
          echo "- PNGs generated: $PNG_COUNT" >> $GITHUB_STEP_SUMMARY

  # ── JOB 2: ICON ──────────────────────────────────────────────────────────
  # Only runs when model = ICON or all.
  # Weights file is cached between runs — only downloaded on first run.
  generate-icon-maps:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: |
      github.event.inputs.model == 'ICON' ||
      github.event.inputs.model == 'all'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgeos-dev libproj-dev proj-data proj-bin \
            libeccodes-dev libeccodes-tools \
            libraqm-dev libfribidi-dev libharfbuzz-dev \
            python3-eccodes

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install eccodes==1.6.1
          pip install cfgrib xarray netCDF4
          pip install -r requirements.txt

      # Cache the 123MB weights file so it's only downloaded on first run.
      # GitHub Actions cache persists for 7 days and resets if unused.
      - name: Cache ICON remapping weights
        uses: actions/cache@v4
        id: icon-weights-cache
        with:
          path: geodata/weights_icogl2world_025.nc
          key: icon-weights-0026-R03B07-025

      - name: Download ICON remapping weights
        if: steps.icon-weights-cache.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss — downloading ICON weights from DWD..."
          curl -L --retry 3 --retry-delay 5 \
            -o geodata/ICON_GLOBAL2WORLD_025_EASY.tar.bz2 \
            "https://opendata.dwd.de/weather/lib/cdo/ICON_GLOBAL2WORLD_025_EASY.tar.bz2"
          tar -xjf geodata/ICON_GLOBAL2WORLD_025_EASY.tar.bz2 -C geodata/
          rm geodata/ICON_GLOBAL2WORLD_025_EASY.tar.bz2
          ls -lh geodata/weights_icogl2world_025.nc

      - name: Confirm weights file present
        run: |
          echo "Cache hit: ${{ steps.icon-weights-cache.outputs.cache-hit }}"
          ls -lh geodata/weights_icogl2world_025.nc

      - name: Download existing meta.json from R2 (for preservation)
        run: |
          mkdir -p output
          curl -sf "${{ secrets.R2_PUBLIC_URL }}/latest/meta.json" \
            -o output/existing_meta.json || echo "No existing meta.json found (first run)"
        continue-on-error: true

      - name: Generate ICON rainfall PNG maps
        run: |
          python scripts/rainfall_png_maps.py \
            --district-geojson geodata/gujarat_district_clean.geojson \
            --india-geojson geodata/india-composite.geojson \
            --india-states-geojson geodata/india_state.geojson \
            --model ICON \
            --cycle ${{ github.event.inputs.cycle }} \
            --outdir output
        env:
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL:      ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME:       ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL:        ${{ secrets.R2_PUBLIC_URL }}

      - name: Upload ICON maps to Cloudflare R2
        run: python scripts/upload_to_r2.py
        env:
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL:      ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME:       ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL:        ${{ secrets.R2_PUBLIC_URL }}

      - name: Summary
        run: |
          echo "## ICON Rainfall Maps" >> $GITHUB_STEP_SUMMARY
          echo "- Model: ICON Global (DWD)" >> $GITHUB_STEP_SUMMARY
          echo "- Cycle: ${{ github.event.inputs.cycle }}" >> $GITHUB_STEP_SUMMARY
          echo "- Weights cache hit: ${{ steps.icon-weights-cache.outputs.cache-hit }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u)" >> $GITHUB_STEP_SUMMARY
          PNG_COUNT=$(find output -name "*.png" 2>/dev/null | wc -l)
          echo "- PNGs generated: $PNG_COUNT" >> $GITHUB_STEP_SUMMARY
