name: Rainfall Forecast Maps

on:
  schedule:
    # Run twice daily — for 00z and 12z cycles only.
    # Offset by 3.5 hours to allow model data to be fully published.
    - cron: '30 3 * * *'   # 03:30 UTC → for 00z run
    - cron: '30 15 * * *'  # 15:30 UTC → for 12z run

  workflow_dispatch:
    # Manual trigger — pick model and cycle explicitly.
    # Use this when you know a specific run is ready.
    inputs:
      model:
        description: 'Model to run'
        required: true
        default: 'both'
        type: choice
        options: [both, GFS, ECMWF]
      cycle:
        description: 'Model cycle UTC hour (auto = detect from cron time)'
        required: true
        default: 'auto'
        type: choice
        options: ['auto', '00', '06', '12', '18']

jobs:
  generate-maps:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgeos-dev libproj-dev proj-data proj-bin \
            libeccodes-dev libeccodes-tools \
            libraqm-dev libfribidi-dev libharfbuzz-dev \
            python3-eccodes

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install eccodes==1.6.1
          pip install cfgrib xarray
          pip install -r requirements.txt

      - name: Determine model and cycle
        id: params
        run: |
          # Model — from manual input or default both for cron
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "model=${{ github.event.inputs.model }}" >> $GITHUB_OUTPUT
            echo "cycle=${{ github.event.inputs.cycle }}" >> $GITHUB_OUTPUT
          else
            echo "model=both" >> $GITHUB_OUTPUT
            echo "cycle=auto" >> $GITHUB_OUTPUT
          fi

      - name: Download existing meta.json from R2 (for preservation)
        # Fetch the current latest meta.json from R2 so we can
        # preserve model entries that don't get updated this run.
        # If it doesn't exist yet (first run), that's fine — we just skip.
        run: |
          mkdir -p output
          curl -sf "${{ secrets.R2_PUBLIC_URL }}/latest/meta.json" \
            -o output/existing_meta.json || echo "No existing meta.json found (first run)"
        continue-on-error: true

      - name: Generate rainfall PNG maps
        run: |
          python scripts/rainfall_png_maps.py \
            --district-geojson geodata/gujarat_district_clean.geojson \
            --india-geojson geodata/india-composite.geojson \
            --india-states-geojson geodata/india_state.geojson \
            --model ${{ steps.params.outputs.model }} \
            --cycle ${{ steps.params.outputs.cycle }} \
            --outdir output
        env:
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL:      ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME:       ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL:        ${{ secrets.R2_PUBLIC_URL }}

      - name: Upload to Cloudflare R2
        run: python scripts/upload_to_r2.py
        env:
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL:      ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME:       ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL:        ${{ secrets.R2_PUBLIC_URL }}

      - name: Summary
        run: |
          echo "## Rainfall Maps" >> $GITHUB_STEP_SUMMARY
          echo "- Model: ${{ steps.params.outputs.model }}" >> $GITHUB_STEP_SUMMARY
          echo "- Cycle: ${{ steps.params.outputs.cycle }}" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u)" >> $GITHUB_STEP_SUMMARY
          PNG_COUNT=$(find output -name "*.png" 2>/dev/null | wc -l)
          echo "- PNGs generated: $PNG_COUNT" >> $GITHUB_STEP_SUMMARY
